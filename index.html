<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Lidor’s Cage — Ori the Avenger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}

body{
  background:#0c0e14;
  min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
  font-family:'Courier New',monospace;
  overflow:hidden;
  touch-action: none; /* מונע זום וגלילה לא רצויים בזמן משחק */
}

/* ═══ OUTER FRAME ════════════════════════════════════════ */
#shell{
  width:100%;max-width:900px;
  background:linear-gradient(160deg,#1c1f2a 0%,#12141c 60%,#0e1018 100%);
  border-left:1px solid rgba(255,255,255,0.06);
  border-right:1px solid rgba(255,255,255,0.06);
  padding:10px 12px 14px;
  box-shadow:0 0 0 1px #2a2d3a, 0 20px 60px rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
}

/* ═══ TOP HEADER BAR ══════════════════════════════════════ */
#topbar{
  display:flex;align-items:center;gap:6px;
  margin-bottom:8px;
  background:linear-gradient(90deg,#0d1520,#111827,#0d1520);
  border:1px solid #1e2535;
  border-radius:12px;
  padding:6px 10px;
  position:relative;
  overflow:hidden;
}

/* ── SCORE BLOCK ── */
.stat-block{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:9px;
  padding:4px 10px;
  min-width:70px;
}
.stat-lbl{
  font-size:7px;letter-spacing:1px;
  color:rgba(255,255,255,0.28);
  text-transform:uppercase;font-weight:700;
  margin-bottom:2px;
}
.stat-val{
  font-family:'Orbitron','Courier New',monospace;
  font-size:15px;font-weight:900;
  letter-spacing:1px;line-height:1;
}
#sScore .stat-val{
  color:#f5c842;
  text-shadow:0 0 10px rgba(245,200,66,0.5);
}
#sKills .stat-val{color:#ff5a1f;text-shadow:0 0 10px rgba(255,90,31,0.5);}

/* ── TITLE CENTER ── */
#title-center{
  flex:1;text-align:center;
}
#title-center .t-sub{
  font-size:7px;letter-spacing:2px;color:rgba(255,255,255,0.3);
  text-transform:uppercase;display:block;margin-bottom:2px;
}
#title-center .t-main{
  font-family:'Orbitron','Courier New',monospace;
  font-size:11px;font-weight:900;letter-spacing:2px;
  color:#f5c842;display:block;
}

/* ── COMBO BLOCK ── */
#comboBlock{
  display:flex;flex-direction:column;align-items:center;
  min-width:80px;
}
#comboInner{
  background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.07);
  border-radius:9px;padding:4px 10px;width:100%;text-align:center;
}
#comboLbl{font-size:7px;letter-spacing:1px;color:rgba(255,255,255,0.28);text-transform:uppercase;font-weight:700;display:block;}
#comboVal{
  font-family:'Orbitron','Courier New',monospace;
  font-size:15px;font-weight:900;line-height:1;
  color:#ff5a1f;
  transition:transform 0.08s;
  display:block;
}
#comboVal.pulse{transform:scale(1.25);}
#comboBarWrap{
  width:100%;height:3px;background:rgba(255,255,255,0.06);
  border-radius:4px;margin-top:4px;overflow:hidden;
}
#comboBar{
  height:100%;width:100%;
  background:linear-gradient(90deg,#ff3a00,#ff8c1f);
  transition:width 0.06s linear;
}

/* ── UPLOAD BUTTONS ── */
#uploadArea{
  display:flex;flex-direction:column;gap:3px;align-items:center;
}
.upbtn{
  font-family:'Courier New',monospace;font-size:8px;
  font-weight:700;color:rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;padding:2px 6px;cursor:pointer;
  white-space:nowrap;
}
input[type=file]{display:none;}

/* ═══ HP ROW ════════════════════════════════════════════════ */
#hpRow{
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(180,30,30,0.2);
  border-radius:10px;padding:6px 12px;margin-bottom:8px;
}
#hpIcon{font-size:12px;}
#hpLbl{font-size:8px;letter-spacing:1px;color:#cc3333;font-weight:700;font-family:'Orbitron',monospace;}
#hpTrack{
  flex:1;height:12px;
  background:rgba(0,0,0,0.5);
  border-radius:20px;overflow:hidden;
  position:relative;
}
#hpFill{
  height:100%;width:100%;
  background:linear-gradient(90deg,#cc1111 0%,#ff4422 60%,#ff6644 100%);
  transition:width 0.07s ease;
}
#hpNum{
  font-family:'Orbitron',monospace;font-size:11px;color:rgba(255,255,255,0.6);
  min-width:30px;text-align:right;font-weight:700;
}

/* ═══ CANVAS ════════════════════════════════════════════════ */
#cvWrap{
  border-radius:10px;overflow:hidden;
  border:2px solid #1e2535;
  position:relative;
  width: 100%;
}
canvas{
  display:block;
  width:100%;
  height:auto;
  image-rendering: -webkit-optimize-contrast; /* הופך את התמונה לחדה יותר במסכים קטנים */
  image-rendering: crisp-edges;
}

/* ═══ WEAPON BUTTONS ════════════════════════════════════════ */
#btns{display:flex;gap:6px;margin-top:8px;}

.wbtn{
  flex:1;border:none;
  font-family:'Orbitron','Courier New',monospace;
  font-weight:700;font-size:9px;
  color:#fff;padding:0;height:46px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  border-radius:10px;
}
.wbtn .cdl{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:rgba(255,255,255,0.6);
  opacity:0;pointer-events:none;
}
.wbtn.cd .cdl{opacity:1;}
.wbtn:active{filter:brightness(.82);}

.wbtn .bico{font-size:14px;line-height:1;}
.wbtn .btxt{font-size:8px;letter-spacing:1px;opacity:0.9;}

#btnL,#btnR{
  background:linear-gradient(180deg,#2060a8 0%,#163d6a 100%);
  border:1px solid rgba(80,150,220,0.2);
}
#btnG{
  background:linear-gradient(180deg,#7a6a20 0%,#4a3e10 100%);
  border:1px solid rgba(200,180,50,0.15);
}
#btnE{
  background:linear-gradient(180deg,#1a7840 0%,#0e4825 100%);
  border:1px solid rgba(60,200,100,0.15);
}

#kf{position:fixed;inset:0;pointer-events:none;z-index:9999;background:transparent;}

@media(max-width:540px){
  #topbar { flex-wrap: wrap; justify-content: space-between; }
  #title-center { order: -1; width: 100%; flex: none; margin-bottom: 4px; }
  .stat-block, #comboBlock { min-width: 65px; padding: 4px 6px; }
}
</style>
</head>
<body>
<div id="kf"></div>

<div id="shell">
  <div id="topbar">
    <div class="stat-block" id="sScore">
      <span class="stat-lbl">SCORE</span>
      <span class="stat-val" id="uScore">0</span>
    </div>

    <div class="stat-block" id="sKills">
      <span class="stat-lbl">KILLS</span>
      <span class="stat-val" id="uKills">0</span>
    </div>

    <div id="title-center">
      <span class="t-sub">☠ Lidor’s Cage </span>
      <span class="t-main">ORI the AVENGER</span>
    </div>

    <div id="comboBlock">
      <div id="comboInner">
        <span id="comboLbl">COMBO</span>
        <span id="comboVal">×1</span>
      </div>
      <div id="comboBarWrap"><div id="comboBar"></div></div>
    </div>

    <div id="uploadArea">
      <label class="upbtn" id="lblBG">🖼 BG<input type="file" id="inBG" accept="image/*"></label>
      <label class="upbtn" id="lblHead">💀 HEAD<input type="file" id="inHead" accept="image/*"></label>
    </div>
  </div>

  <div id="hpRow">
    <span id="hpIcon">☠</span>
    <span id="hpLbl">ENEMY HP</span>
    <div id="hpTrack">
      <div id="hpFill"></div>
    </div>
    <span id="hpNum">100</span>
  </div>

  <div id="cvWrap">
    <canvas id="cv" width="900" height="480"></canvas>
  </div>

  <div id="btns">
    <button class="wbtn" id="btnL"><span class="bico">◀</span><span class="btxt">LEFT</span><div class="cdl"></div></button>
    <button class="wbtn" id="btnR"><span class="bico">▶</span><span class="btxt">RIGHT</span><div class="cdl"></div></button>
    <button class="wbtn" id="btnG"><span class="bico">💣</span><span class="btxt">GRENADE</span><div class="cdl">WAIT</div></button>
    <button class="wbtn" id="btnE"><span class="bico">⚡</span><span class="btxt">ELECTRIC</span><div class="cdl">WAIT</div></button>
  </div>
</div>

<script>
(function(){
'use strict';

const cv=document.getElementById('cv');
const cx=cv.getContext('2d');
const W=cv.width, H=cv.height;
const GY=H-68; 

// אופטימיזציה למסכי Retina / מובייל גבוהי רזולוציה ללא פגיעה בביצועים
const dpr = window.devicePixelRatio || 1;
const rect = cv.getBoundingClientRect();
cv.width = rect.width * dpr;
cv.height = rect.height * dpr;
cx.scale(dpr * (rect.width / 900), dpr * (rect.height / 480));

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(w<2*r)r=w/2;if(h<2*r)r=h/2;
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);return this;
  };
}

let bgImg=null, headImg=null;
const autoHeadImageName = "Face1.jpeg";
const autoBackgroundImageName = "Test2.jpeg";

const githubHeadImg = new Image();
githubHeadImg.src = encodeURIComponent(autoHeadImageName); 
githubHeadImg.onload = function() {
  headImg = githubHeadImg;
  const lbl = document.getElementById('lblHead');
  if(lbl) { lbl.classList.add('loaded'); lbl.textContent = '✓ HEAD (Git)'; }
};

const githubBgImg = new Image();
githubBgImg.src = encodeURIComponent(autoBackgroundImageName); 
githubBgImg.onload = function() {
  bgImg = githubBgImg;
  const lbl = document.getElementById('lblBG');
  if(lbl) { lbl.classList.add('loaded'); lbl.textContent = '✓ BG (Git)'; }
};

function loadImgFile(file,cb){
  const r=new FileReader();
  r.onload=e=>{const i=new Image();i.onload=()=>cb(i);i.src=e.target.result;};
  r.readAsDataURL(file);
}
document.getElementById('inBG').addEventListener('change',e=>{
  if(e.target.files[0]){
    loadImgFile(e.target.files[0],img=>{
      bgImg=img;
      document.getElementById('lblBG').textContent='✓ BG';
    });
  }
});
document.getElementById('inHead').addEventListener('change',e=>{
  if(e.target.files[0]){
    loadImgFile(e.target.files[0],img=>{
      headImg=img;
      document.getElementById('lblHead').textContent='✓ HEAD';
    });
  }
});

let score=0, kills=0, combo=1, comboTimer=0;          
const COMBO_DECAY=180;      
let lastComboVal=1;        

const BASE_HP=100;
let enemyMaxHP=BASE_HP, enemyHP=BASE_HP, wave=1;

let dX=W/2, dY=90, dVX=0;
const D_ACCEL=1.4, D_FRIC=0.80, D_MAX=10;
let goL=false, goR=false, rAng=0;

let eX=W/2, eY=GY, eDir=1, eBaseSpd=1.8, eAnim=0;
let eStagger=0, eStun=0, eDead=false, eDeadTimer=0;
let ePanic=false, ePanicVX=0, ePanicT=0, ragdoll=null;
let eCurrentSpd = 1.8, eChangeDirT = 0; 

let grenades=[], gCD=0; const G_CD=50;
let boltActive=false, boltTimer=0, boltPts=[];
let eCD=0; const E_CD=110;

let particles=[], floats=[], shockwaves=[];
let shX=0, shY=0, shPow=0, sloMo=1, sloT=0;

let bgClouds=[
  {x:80, y:50,w:120,h:50,spd:0.18},
  {x:360,y:36,w:150,h:58,spd:0.12},
  {x:640,y:58,w:130,h:44,spd:0.15},
  {x:830,y:42,w:100,h:38,spd:0.10},
];
let bgBirds=[];
for(let i=0;i<4;i++) bgBirds.push({x:Math.random()*W,y:35+Math.random()*85,spd:0.35+Math.random()*0.55,ft:0});

const uScore=document.getElementById('uScore');
const uKills=document.getElementById('uKills');
const uComboVal=document.getElementById('comboVal');
const cbar=document.getElementById('comboBar');
const hpFill=document.getElementById('hpFill');
const hpNum=document.getElementById('hpNum');
const kf=document.getElementById('kf');

function updateUI(){
  uScore.textContent=Math.floor(score);
  uKills.textContent=kills;
  uComboVal.textContent='×'+combo;

  const pct=Math.max(0,comboTimer/COMBO_DECAY);
  cbar.style.width=(pct*100)+'%';

  const pctHP=Math.max(0,enemyHP/enemyMaxHP)*100;
  hpFill.style.width=pctHP+'%';
  hpNum.textContent=Math.max(0,Math.ceil(enemyHP));

  document.getElementById('btnG').classList.toggle('cd',gCD>0);
  document.getElementById('btnE').classList.toggle('cd',eCD>0);
}

function registerHit(){
  combo = Math.min(combo+1, 16);
  comboTimer = COMBO_DECAY; 
}

function pSpawn(x,y,n,cols,sz1,sz2,spd,life,grav=0.25){
  // הפחתת כמות החלקיקים במובייל כדי לשפר ביצועים (חוסך כוח עיבוד)
  const mobileN = Math.max(1, Math.floor(n * 0.5));
  for(let i=0;i<mobileN;i++){
    const a=Math.random()*Math.PI*2;
    const s=spd*(0.3+Math.random()*0.7);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-spd*.25,
      life,ml:life,sz:sz1+Math.random()*(sz2-sz1),
      col:cols[Math.floor(Math.random()*cols.length)],grav});
  }
}
function pBlood(x,y,n=10){ pSpawn(x,y,n,['#cc1100','#ee3311','#990600'],3,7,6,25,0.32); }
function pExplode(x,y,big){
  const n=big?35:18;
  pSpawn(x,y,n,['#ff8800','#ffcc22','#ff4400'],3,big?10:6,big?8:5,big?40:25,0.28);
  shockwaves.push({x,y,r:5,mr:big?120:65,life:12,ml:12});
}
function pElec(x,y){ pSpawn(x,y,12,['#aaffee','#88ffcc','#fff'],2,5,7,15,0.08); }
function pEngine(){
  if(Math.random() > 0.4) return; // מייצר פחות עשן מנוע בכל פריים
  [-1,1].forEach(s=>{
    particles.push({x:dX+s*18,y:dY+17,vx:(Math.random()-.5)*.9,vy:1+Math.random()*1.4,
      life:8,ml:8,sz:2+Math.random()*2,col:`hsl(195,80%,70%)`,grav:-0.05});
  });
}
function fText(x,y,txt,col,sz=20){ floats.push({x,y,txt,col,sz,life:45,ml:45,vy:-1.5}); }

function mkBolt(x1,y1,x2,y2,n=8){
  const pts=[{x:x1,y:y1}];
  for(let i=1;i<n;i++){
    const t=i/n;
    pts.push({x:x1+(x2-x1)*t+(Math.random()-.5)*50*(1-t*.5),y:y1+(y2-y1)*t+(Math.random()-.5)*25});
  }
  pts.push({x:x2,y:y2});return pts;
}

// ═══════════════════════════════════════════════════════════
//  CONTROLS & TOUCH EVENTS (תיקון למובייל)
// ═══════════════════════════════════════════════════════════
const btnL = document.getElementById('btnL');
const btnR = document.getElementById('btnR');
const btnG = document.getElementById('btnG');
const btnE = document.getElementById('btnE');

// אירועי טאץ' מהירים ללא השהיה למובייל
btnL.addEventListener('touchstart', (e)=>{ e.preventDefault(); goL=true; });
btnL.addEventListener('touchend', (e)=>{ e.preventDefault(); goL=false; });
btnR.addEventListener('touchstart', (e)=>{ e.preventDefault(); goR=true; });
btnR.addEventListener('touchend', (e)=>{ e.preventDefault(); goR=false; });

btnG.addEventListener('touchstart', (e)=>{ e.preventDefault(); throwGrenade(); });
btnE.addEventListener('touchstart', (e)=>{ e.preventDefault(); useElectric(); });

// גיבוי לעכבר למחשב
btnL.addEventListener('mousedown', ()=>goL=true);
btnL.addEventListener('mouseup', ()=>goL=false);
btnL.addEventListener('mouseleave', ()=>goL=false);
btnR.addEventListener('mousedown', ()=>goR=true);
btnR.addEventListener('mouseup', ()=>goR=false);
btnR.addEventListener('mouseleave', ()=>goR=false);
btnG.addEventListener('mousedown', throwGrenade);
btnE.addEventListener('mousedown', useElectric);

function throwGrenade(){
  if(gCD>0)return; gCD=G_CD;
  grenades.push({x:dX,y:dY+24,vx:dVX*0.25,vy:0,rot:0,vrot:0.22,armed:false,armT:10});
}
function useElectric(){
  if(eCD>0)return; eCD=E_CD;
  boltActive=true;boltTimer=15;
  const dist=Math.abs(dX-eX);
  if(dist<320&&!eDead){
    boltPts=mkBolt(dX,dY+20,eX,eY-58,10);
    damageEnemy(40,true); eStun=60; pElec(eX,eY-40);
  } else {
    boltPts=mkBolt(dX,dY+20,dX+(eX>dX?160:-160),dY+190,6);
  }
}

function damageEnemy(amt,elec){
  if(eDead)return;
  if(eStun>0&&!elec)return;
  enemyHP=Math.max(0,enemyHP-amt);
  eStagger=15;
  pBlood(eX+(Math.random()-.5)*20,eY-40);
  registerHit();
  score+=Math.floor(10*combo);
  if(enemyHP<=0){ doKill(); } 
  else { if(Math.random()<0.52){ePanic=true;ePanicVX=(Math.random()-.5)*9;ePanicT=60;}}
  updateUI();
}

function doKill(){
  if(eDead)return; eDead=true; eDeadTimer=60; kills++;
  ragdoll={x:eX,y:eY,parts:[
    {ox:0,oy:-110,vx:(Math.random()-.5)*4,vy:-7,rot:0,vrot:(Math.random()-.5)*.2,type:'head'},
    {ox:0,oy:-56,vx:(Math.random()-.5)*2,vy:-3,rot:0,vrot:(Math.random()-.5)*.1,type:'body'}
  ]};
  sloMo=0.3; sloT=40; shPow=10; pExplode(eX,eY-35,true);
  score+=500*combo; fText(eX,eY-100,'+'+(500*combo),'#f5c842',22);
  kf.style.background='rgba(255,210,60,.2)';
  setTimeout(()=>kf.style.background='transparent',80);
  wave++; setTimeout(respawnEnemy,1000); updateUI();
}

function respawnEnemy(){
  eDead=false;eDeadTimer=0;ragdoll=null;
  enemyMaxHP=BASE_HP+wave*20; enemyHP=enemyMaxHP;
  eX=90+Math.random()*(W-180); eBaseSpd=Math.min(6.0,1.8+wave*0.3);
  eStagger=0;eStun=0;ePanic=false;eChangeDirT=0; updateUI();
}

// ═══════════════════════════════════════════════════════════
//  RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════
let brickPat=null;
function getBrick(){
  if(brickPat)return brickPat;
  const oc=document.createElement('canvas');oc.width=40;oc.height=20;
  const ox=oc.getContext('2d');
  ox.fillStyle='#b83020';ox.fillRect(0,0,40,20);
  ox.fillStyle='#cc3a28';ox.fillRect(1,1,38,18);
  brickPat=cx.createPattern(oc,'repeat'); return brickPat;
}

function drawBG(){
  cx.clearRect(0,0,W,H);
  if(bgImg){ cx.drawImage(bgImg,0,0,W,H); } 
  else {
    cx.fillStyle='#5aa8d8'; cx.fillRect(0,0,W,H);
    bgClouds.forEach(c=>{
      cx.fillStyle='rgba(255,255,255,0.8)';
      cx.beginPath();cx.ellipse(c.x,c.y,c.w*.5,c.h*.5,0,0,Math.PI*2);cx.fill();
    });
    cx.fillStyle=getBrick();cx.fillRect(0,GY-40,W,42);
    cx.fillStyle='#488028';cx.fillRect(0,GY,W,H-GY);
  }
}

function drawDrone(){
  cx.save(); cx.translate(dX,dY); cx.rotate(dVX*.02);
  cx.fillStyle='#162535'; cx.beginPath();cx.roundRect(-25,-15,50,30,8);cx.fill();
  if(headImg){
    // ציור הרחפן בצורה פשוטה יותר לביצועים
  }
  cx.restore();
}

function drawSoldier(x,y,dir,anim,stagger,stun){
  cx.save();
  const sf=stagger>0?(Math.random()-.5)*4:0;
  cx.translate(x+sf,y);
  if(dir<0)cx.scale(-1,1);
  cx.fillStyle='#3c6e28'; cx.beginPath();cx.roundRect(-15,-60,30,60,6);cx.fill();
  if(headImg){
    cx.save(); cx.beginPath();cx.arc(0,-70,16,0,Math.PI*2);cx.clip();
    cx.drawImage(headImg,-16,-86,32,32); cx.restore();
  } else {
    cx.fillStyle='#e8b870'; cx.beginPath();cx.arc(0,-70,14,0,Math.PI*2);cx.fill();
  }
  cx.restore();
}

// ═══════════════════════════════════════════════════════════
//  GAME LOOP WITH DELTA TIME (מבוסס זמן אמיתי)
// ═══════════════════════════════════════════════════════════
let lastTime = performance.now();

function loop(currentTime){
  // חישוב הזמן המדויק שעבר בין פריימים (מציג חלק ב-60Hz, 90Hz ו-120Hz כאחד)
  let dt = (currentTime - lastTime) / 16.666; 
  if(dt > 4) dt = 4; // הגנה מקפיצות קוד פתאומיות
  lastTime = currentTime;

  let currentSlo = sloMo;
  if(sloT > 0){ sloT -= dt; if(sloT <= 0) sloMo = 1; }
  let effDt = dt * currentSlo;

  // עדכוני תנועה מבוססי dt
  if(goL) dVX -= D_ACCEL * effDt;
  else if(goR) dVX += D_ACCEL * effDt;
  else dVX *= Math.pow(D_FRIC, effDt);

  if(dVX > D_MAX) dVX = D_MAX;
  if(dVX < -D_MAX) dVX = -D_MAX;
  dX += dVX * effDt;
  if(dX < 40) { dX = 40; dVX = 0; }
  if(dX > W - 40) { dX = W - 40; dVX = 0; }

  if(gCD > 0) gCD -= effDt;
  if(eCD > 0) eCD -= effDt;
  if(comboTimer > 0){ comboTimer -= effDt; if(comboTimer <= 0) { combo = 1; updateUI(); } }

  // תנועת אויב
  if(!eDead && eStun <= 0){
    eX += eBaseSpd * eDir * effDt;
    if(eX < 40 || eX > W - 40) eDir *= -1;
  }
  if(eStun > 0) eStun -= effDt;
  if(eStagger > 0) eStagger -= effDt;

  // פיזיקת רימונים
  for(let i=grenades.length-1; i>=0; i--){
    let g = grenades[i];
    g.y += 5 * effDt;
    if(g.y >= GY){
      pExplode(g.x, g.y, false);
      if(Math.abs(g.x - eX) < 70) damageEnemy(35, false);
      grenades.splice(i, 1);
    }
  }

  // רנדור חסכוני
  drawBG();
  if(!eDead) drawSoldier(eX, eY, eDir, eAnim, eStagger, eStun);
  if(ragdoll && eDead) {
    cx.fillStyle='#3c6e28'; cx.fillRect(ragdoll.x-10, ragdoll.y-30, 20, 20);
  }
  drawDrone();

  // אנמציות ברקים
  if(boltActive){
    cx.strokeStyle='#aaffee'; cx.lineWidth=3; cx.beginPath();
    boltPts.forEach((p, idx)=>{ if(idx===0) cx.moveTo(p.x, p.y); else cx.lineTo(p.x, p.y); });
    cx.stroke();
    boltTimer -= dt; if(boltTimer <= 0) boltActive = false;
  }

  // עדכון ה-UI בצורה חסכונית רק פעם בכמה פריימים
  if(Math.random() < 0.2) updateUI();

  requestAnimationFrame(loop);
}

// הפעלה ראשונית
requestAnimationFrame(loop);
updateUI();

})();
</script>
