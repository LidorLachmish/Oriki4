<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Lidor’s Cage — Ori the Avenger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}

body{
  background:#0c0e14;
  min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
  font-family:'Courier New',monospace;
  overflow:hidden;
}

/* ═══ OUTER FRAME ════════════════════════════════════════ */
#shell{
  width:100%;max-width:900px;
  background:linear-gradient(160deg,#1c1f2a 0%,#12141c 60%,#0e1018 100%);
  border-left:1px solid rgba(255,255,255,0.06);
  border-right:1px solid rgba(255,255,255,0.06);
  padding:10px 12px 14px;
  box-shadow:0 0 0 1px #2a2d3a, 0 20px 60px rgba(0,0,0,0.8);
}

/* ═══ TOP HEADER BAR ══════════════════════════════════════ */
#topbar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;
  background:linear-gradient(90deg,#0d1520,#111827,#0d1520);
  border:1px solid #1e2535;
  border-radius:12px;
  padding:8px 14px;
  position:relative;
  overflow:hidden;
}
#topbar::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(245,200,66,0.03),transparent);
  pointer-events:none;
}

/* ── SCORE BLOCK ── */
.stat-block{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:9px;
  padding:6px 16px;
  min-width:90px;
  position:relative;
  overflow:hidden;
}
.stat-block::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
}
.stat-lbl{
  font-size:8px;letter-spacing:3px;
  color:rgba(255,255,255,0.28);
  text-transform:uppercase;font-weight:700;
  margin-bottom:2px;
}
.stat-val{
  font-family:'Orbitron','Courier New',monospace;
  font-size:20px;font-weight:900;
  letter-spacing:1px;line-height:1;
}
#sScore .stat-val{
  color:#f5c842;
  text-shadow:0 0 20px rgba(245,200,66,0.5),0 0 40px rgba(245,200,66,0.2);
}
#sKills .stat-val{color:#ff5a1f;text-shadow:0 0 16px rgba(255,90,31,0.5);}

/* ── TITLE CENTER ── */
#title-center{
  flex:1;text-align:center;
}
#title-center .t-sub{
  font-size:8px;letter-spacing:5px;color:rgba(255,255,255,0.3);
  text-transform:uppercase;display:block;margin-bottom:2px;
}
#title-center .t-main{
  font-family:'Orbitron','Courier New',monospace;
  font-size:14px;font-weight:900;letter-spacing:4px;
  color:#f5c842;display:block;
  text-shadow:0 0 20px rgba(245,200,66,0.6);
}

/* ── COMBO BLOCK ── */
#comboBlock{
  display:flex;flex-direction:column;align-items:center;
  min-width:110px;
}
#comboInner{
  background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.07);
  border-radius:9px;padding:6px 16px;width:100%;text-align:center;
  position:relative;overflow:hidden;
}
#comboInner::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
}
#comboLbl{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.28);text-transform:uppercase;font-weight:700;display:block;margin-bottom:2px;}
#comboVal{
  font-family:'Orbitron','Courier New',monospace;
  font-size:20px;font-weight:900;letter-spacing:1px;line-height:1;
  color:#ff5a1f;
  text-shadow:0 0 16px rgba(255,90,31,0.6);
  transition:transform 0.08s;
  display:block;
}
#comboVal.pulse{transform:scale(1.35);}
/* combo timer bar */
#comboBarWrap{
  width:100%;height:4px;background:rgba(255,255,255,0.06);
  border-radius:4px;margin-top:4px;overflow:hidden;
}
#comboBar{
  height:100%;width:100%;
  background:linear-gradient(90deg,#ff3a00,#ff8c1f);
  border-radius:4px;
  transition:width 0.06s linear, background 0.3s;
  box-shadow:0 0 6px rgba(255,100,30,0.6);
}

/* ── UPLOAD BUTTONS ── */
#uploadArea{
  display:flex;flex-direction:column;gap:4px;align-items:center;
}
.upbtn{
  font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;
  font-weight:700;color:rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;padding:4px 8px;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
  display:flex;align-items:center;gap:4px;
}
.upbtn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);}
.upbtn.loaded{border-color:rgba(80,255,120,0.4);color:rgba(80,255,120,0.8);}
input[type=file]{display:none;}

/* ═══ HP ROW ════════════════════════════════════════════════ */
#hpRow{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(180,30,30,0.2);
  border-radius:10px;padding:7px 14px;margin-bottom:8px;
}
#hpIcon{font-size:14px;}
#hpLbl{font-size:8px;letter-spacing:3px;color:#cc3333;font-weight:700;white-space:nowrap;font-family:'Orbitron',monospace;}
#hpTrack{
  flex:1;height:14px;
  background:rgba(0,0,0,0.5);
  border-radius:20px;overflow:hidden;
  border:1px solid rgba(100,0,0,0.4);
  position:relative;
}
#hpFill{
  height:100%;width:100%;
  background:linear-gradient(90deg,#cc1111 0%,#ff4422 60%,#ff6644 100%);
  border-radius:20px;transition:width 0.07s ease;
  position:relative;
}
#hpFill::after{
  content:'';position:absolute;top:0;left:0;right:0;height:45%;
  background:rgba(255,255,255,0.15);border-radius:20px 20px 0 0;
}
#hpSeg{
  position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 24%,rgba(0,0,0,0.25) 24.5%,rgba(0,0,0,0.25) 25%);
  border-radius:20px;pointer-events:none;
}
#hpNum{
  font-family:'Orbitron',monospace;font-size:12px;color:rgba(255,255,255,0.6);
  min-width:38px;text-align:right;font-weight:700;
}

/* ═══ CANVAS ════════════════════════════════════════════════ */
#cvWrap{
  border-radius:10px;overflow:hidden;
  border:2px solid #1e2535;
  box-shadow:0 0 0 1px #0a0c12,inset 0 0 40px rgba(0,0,0,0.3);
  position:relative;
}
canvas{display:block;width:100%;height:auto;}

/* ═══ WEAPON BUTTONS ════════════════════════════════════════ */
#btns{display:flex;gap:7px;margin-top:8px;}

.wbtn{
  flex:1;border:none;cursor:pointer;
  font-family:'Orbitron','Courier New',monospace;
  font-weight:700;font-size:10px;letter-spacing:1.5px;
  color:#fff;padding:0;height:52px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  position:relative;overflow:hidden;
  border-radius:10px;
  transition:filter .08s,transform .07s,box-shadow .07s;
}
/* top shine */
.wbtn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:45%;
  background:rgba(255,255,255,0.1);border-radius:10px 10px 0 0;pointer-events:none;
}
/* cooldown overlay */
.wbtn .cdl{
  position:absolute;inset:0;border-radius:10px;
  background:rgba(0,0,0,0.65);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.4);
  opacity:0;transition:opacity .12s;pointer-events:none;
}
.wbtn.cd .cdl{opacity:1;}
.wbtn:active{transform:translateY(4px);filter:brightness(.82);}
.wbtn:hover:not(.cd){filter:brightness(1.14);}

.wbtn .bico{font-size:18px;line-height:1;}
.wbtn .btxt{font-size:9px;letter-spacing:2px;opacity:0.9;}

/* LEFT/RIGHT - steel blue */
#btnL,#btnR{
  background:linear-gradient(180deg,#2060a8 0%,#163d6a 100%);
  box-shadow:0 5px 0 #0a2040,0 8px 16px rgba(20,70,160,0.3);
  border:1px solid rgba(80,150,220,0.2);
}
/* GRENADE - military olive */
#btnG{
  background:linear-gradient(180deg,#7a6a20 0%,#4a3e10 100%);
  box-shadow:0 5px 0 #251f05,0 8px 16px rgba(120,100,20,0.35);
  border:1px solid rgba(200,180,50,0.15);
}
/* ELECTRIC - toxic green */
#btnE{
  background:linear-gradient(180deg,#1a7840 0%,#0e4825 100%);
  box-shadow:0 5px 0 #062415,0 8px 16px rgba(30,140,70,0.35);
  border:1px solid rgba(60,200,100,0.15);
}

/* ── KILL FLASH ── */
#kf{position:fixed;inset:0;pointer-events:none;z-index:9999;background:transparent;}

/* ── RESPONSIVE ── */
@media(max-width:540px){
  .stat-val{font-size:15px;}
  .wbtn{height:44px;}
  .wbtn .bico{font-size:14px;}
  #title-center .t-main{font-size:11px;}
}
</style>
</head>
<body>
<div id="kf"></div>

<div id="shell">

  <div id="topbar">

    <div class="stat-block" id="sScore">
      <span class="stat-lbl">SCORE</span>
      <span class="stat-val" id="uScore">0</span>
    </div>

    <div class="stat-block" id="sKills">
      <span class="stat-lbl">KILLS</span>
      <span class="stat-val" id="uKills">0</span>
    </div>

    <div id="title-center">
      <span class="t-sub">☠ Lidor’s Cage </span>
      <span class="t-main">ORI the AVENGER</span>
    </div>

    <div id="comboBlock">
      <div id="comboInner">
        <span id="comboLbl">COMBO</span>
        <span id="comboVal">×1</span>
      </div>
      <div id="comboBarWrap"><div id="comboBar"></div></div>
    </div>

    <div id="uploadArea">
      <label class="upbtn" id="lblBG" title="Upload background image">
        🖼 BG
        <input type="file" id="inBG" accept="image/*">
      </label>
      <label class="upbtn" id="lblHead" title="Upload enemy head image">
        💀 HEAD
        <input type="file" id="inHead" accept="image/*">
      </label>
    </div>

  </div>

  <div id="hpRow">
    <span id="hpIcon">☠</span>
    <span id="hpLbl">ENEMY HP</span>
    <div id="hpTrack">
      <div id="hpFill"></div>
      <div id="hpSeg"></div>
    </div>
    <span id="hpNum">100</span>
  </div>

  <div id="cvWrap">
    <canvas id="cv" width="900" height="480"></canvas>
  </div>

  <div id="btns">
    <button class="wbtn" id="btnL">
      <span class="bico">◀</span><span class="btxt">LEFT</span>
      <div class="cdl"></div>
    </button>
    <button class="wbtn" id="btnR">
      <span class="bico">▶</span><span class="btxt">RIGHT</span>
      <div class="cdl"></div>
    </button>
    <button class="wbtn" id="btnG">
      <span class="bico">💣</span><span class="btxt">GRENADE</span>
      <div class="cdl">WAIT</div>
    </button>
    <button class="wbtn" id="btnE">
      <span class="bico">⚡</span><span class="btxt">ELECTRIC</span>
      <div class="cdl">WAIT</div>
    </button>
  </div>

</div><script>
(function(){
'use strict';

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════
const cv=document.getElementById('cv');
const cx=cv.getContext('2d');
const W=cv.width, H=cv.height;
const GY=H-68; // ground Y

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(w<2*r)r=w/2;if(h<2*r)r=h/2;
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);return this;
  };
}

// ═══════════════════════════════════════════════════════════
//  CUSTOM IMAGES & AUTO-LOAD FROM GITHUB
// ═══════════════════════════════════════════════════════════
let bgImg=null, headImg=null;

const autoHeadImageName = "Face1.jpeg";
const autoBackgroundImageName = "Test2.jpeg";

const githubHeadImg = new Image();
githubHeadImg.src = encodeURIComponent(autoHeadImageName); 
githubHeadImg.onload = function() {
  headImg = githubHeadImg;
  const lbl = document.getElementById('lblHead');
  if(lbl) {
    lbl.classList.add('loaded');
    lbl.textContent = '✓ HEAD (Git)';
  }
};
githubHeadImg.onerror = function() {
  console.log("No automatic head image found in root repo path, waiting for manual upload.");
};

// תיקון יצירת האלמנט לתמונת הרקע
const githubBgImg = new Image();
githubBgImg.src = encodeURIComponent(autoBackgroundImageName); 
githubBgImg.onload = function() {
  bgImg = githubBgImg; // תיקון שם המשתנה הגלובלי מ-backImg ל-bgImg
  const lbl = document.getElementById('lblBG'); // תיקון ה-ID מ-'lblbackground' ל-'lblBG'
  if(lbl) {
    lbl.classList.add('loaded');
    lbl.textContent = '✓ BG (Git)';
  }
};
githubBgImg.onerror = function() {
  console.log("No automatic background image found in root repo path, waiting for manual upload.");
};

function loadImgFile(file,cb){
  const r=new FileReader();
  r.onload=e=>{const i=new Image();i.onload=()=>cb(i);i.src=e.target.result;};
  r.readAsDataURL(file);
}
document.getElementById('inBG').addEventListener('change',e=>{
  if(e.target.files[0]){
    loadImgFile(e.target.files[0],img=>{
      bgImg=img;
      document.getElementById('lblBG').classList.add('loaded');
      document.getElementById('lblBG').textContent='✓ BG';
    });
  }
});
document.getElementById('inHead').addEventListener('change',e=>{
  if(e.target.files[0]){
    loadImgFile(e.target.files[0],img=>{
      headImg=img;
      document.getElementById('lblHead').classList.add('loaded');
      document.getElementById('lblHead').textContent='✓ HEAD';
    });
  }
});

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let score=0, kills=0;
let combo=1;
let comboTimer=0;          
const COMBO_DECAY=180;     
let lastComboVal=1;        

const BASE_HP=100;
let enemyMaxHP=BASE_HP, enemyHP=BASE_HP;
let wave=1;

// DRONE
let dX=W/2, dY=90, dVX=0;
const D_ACCEL=1.4, D_FRIC=0.80, D_MAX=10;
let goL=false, goR=false;
let rAng=0;

// ENEMY
let eX=W/2, eY=GY;
let eDir=1, eBaseSpd=1.8, eAnim=0;
let eStagger=0, eStun=0;
let eDead=false, eDeadTimer=0;
let ePanic=false, ePanicVX=0, ePanicT=0;
let ragdoll=null;
// משתנים לתנועה הרנדומלית של האויב
let eCurrentSpd = 1.8;
let eChangeDirT = 0; 

// WEAPONS
let grenades=[];
let gCD=0; const G_CD=50;
let boltActive=false, boltTimer=0, boltPts=[];
let eCD=0; const E_CD=110;

// EFFECTS
let particles=[], floats=[], shockwaves=[];
let shX=0, shY=0, shPow=0;
let sloMo=1, sloT=0;

// BACKGROUND
let bgClouds=[
  {x:80, y:50,w:120,h:50,spd:0.18},
  {x:360,y:36,w:150,h:58,spd:0.12},
  {x:640,y:58,w:130,h:44,spd:0.15},
  {x:830,y:42,w:100,h:38,spd:0.10},
];
let bgBirds=[];
for(let i=0;i<6;i++) bgBirds.push({x:Math.random()*W,y:35+Math.random()*85,spd:0.35+Math.random()*0.55,ft:0});

// ═══════════════════════════════════════════════════════════
//  UI REFS & UPDATES
// ═══════════════════════════════════════════════════════════
const uScore=document.getElementById('uScore');
const uKills=document.getElementById('uKills');
const uComboVal=document.getElementById('comboVal');
const cbar=document.getElementById('comboBar');
const hpFill=document.getElementById('hpFill');
const hpNum=document.getElementById('hpNum');
const kf=document.getElementById('kf');

function updateUI(){
  uScore.textContent=Math.floor(score);
  uKills.textContent=kills;
  uComboVal.textContent='×'+combo;

  const pct=Math.max(0,comboTimer/COMBO_DECAY);
  cbar.style.width=(pct*100)+'%';
  if(pct>0.6) cbar.style.background='linear-gradient(90deg,#ff3a00,#ff8c1f)';
  else if(pct>0.3) cbar.style.background='linear-gradient(90deg,#ff8c00,#ffcc00)';
  else cbar.style.background='linear-gradient(90deg,#cc2200,#ff4400)';

  if(combo>lastComboVal){
    uComboVal.classList.remove('pulse');
    void uComboVal.offsetWidth; 
    uComboVal.classList.add('pulse');
    setTimeout(()=>uComboVal.classList.remove('pulse'),150);
    lastComboVal=combo;
  }

  const pctHP=Math.max(0,enemyHP/enemyMaxHP)*100;
  hpFill.style.width=pctHP+'%';
  hpNum.textContent=Math.max(0,Math.ceil(enemyHP));
  if(pctHP<25) hpFill.style.background='linear-gradient(90deg,#ff1111,#ff4444)';
  else if(pctHP<55) hpFill.style.background='linear-gradient(90deg,#ff7700,#ffaa22)';
  else hpFill.style.background='linear-gradient(90deg,#cc1111 0%,#ff4422 60%,#ff6644 100%)';

  document.getElementById('btnG').classList.toggle('cd',gCD>0);
  document.getElementById('btnE').classList.toggle('cd',eCD>0);
}

function registerHit(){
  combo = Math.min(combo+1, 16);
  comboTimer = COMBO_DECAY; 
}

// ═══════════════════════════════════════════════════════════
//  PARTICLES & EFFECTS
// ═══════════════════════════════════════════════════════════
function pSpawn(x,y,n,cols,sz1,sz2,spd,life,grav=0.25){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=spd*(0.3+Math.random()*0.7);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-spd*.25,
      life,ml:life,sz:sz1+Math.random()*(sz2-sz1),
      col:cols[Math.floor(Math.random()*cols.length)],grav});
  }
}
function pBlood(x,y,n=18){
  pSpawn(x,y,n,['#cc1100','#ee3311','#990600'],3,9,7.5,30,0.32);
}
function pExplode(x,y,big){
  const n=big?75:38;
  pSpawn(x,y,n,['#ff8800','#ffcc22','#ff4400','#ffee66','#fff'],3,big?15:10,big?10:7,big?52:32,0.28);
  pSpawn(x,y,Math.floor(n*.5),['#444','#666','#999'],3,8,5,24,0.2);
  shockwaves.push({x,y,r:5,mr:big?145:75,life:18,ml:18});
}
function pElec(x,y){
  pSpawn(x,y,28,['#aaffee','#88ffcc','#fff','#eeffaa'],2,6,9,20,0.08);
}
function pEngine(){
  [-1,1].forEach(s=>{
    particles.push({x:dX+s*18,y:dY+17,
      vx:(Math.random()-.5)*.9,vy:1+Math.random()*1.4,
      life:10,ml:10,sz:3+Math.random()*3,
      col:`hsl(${190+Math.random()*45},80%,70%)`,grav:-0.05});
  });
}
function fText(x,y,txt,col,sz=26){
  floats.push({x,y,txt,col,sz,life:62,ml:62,vy:-1.7});
}

function mkBolt(x1,y1,x2,y2,n=14){
  const pts=[{x:x1,y:y1}];
  for(let i=1;i<n;i++){
    const t=i/n;
    pts.push({x:x1+(x2-x1)*t+(Math.random()-.5)*82*(1-t*.5),
              y:y1+(y2-y1)*t+(Math.random()-.5)*36});
  }
  pts.push({x:x2,y:y2});return pts;
}

// ═══════════════════════════════════════════════════════════
//  WEAPONS & COMBAT
// ═══════════════════════════════════════════════════════════
function throwGrenade(){
  if(gCD>0)return;
  gCD=G_CD;
  grenades.push({x:dX,y:dY+24,vx:dVX*0.25,vy:0,rot:0,vrot:0.22,armed:false,armT:10});
}
function useElectric(){
  if(eCD>0)return;
  eCD=E_CD;
  boltActive=true;boltTimer=22;
  const dist=Math.abs(dX-eX);
  if(dist<320&&!eDead){
    boltPts=mkBolt(dX,dY+20,eX,eY-58,14);
    damageEnemy(40,true);
    eStun=75;
    pElec(eX,eY-40);
    fText(eX,eY-125,'⚡ ZAPPED!','#aaffee',22);
  } else {
    boltPts=mkBolt(dX,dY+20,dX+(eX>dX?160:-160),dY+190,8);
    fText(dX,dY-55,'OUT OF RANGE','#ff9933',15);
  }
}

function damageEnemy(amt,elec){
  if(eDead)return;
  if(eStun>0&&!elec)return;
  enemyHP=Math.max(0,enemyHP-amt);
  eStagger=24;
  pBlood(eX+(Math.random()-.5)*32,eY-48+Math.random()*42);

  registerHit();

  const hitScore=Math.floor(10*combo);
  score+=hitScore;

  if(enemyHP<=0){
    doKill();
  } else {
    if(Math.random()<0.52){ePanic=true;ePanicVX=(Math.random()-.5)*11;ePanicT=82;}
  }
  updateUI();
}

function doKill(){
  if(eDead)return;
  eDead=true; eDeadTimer=85;
  kills++;
  ragdoll={x:eX,y:eY,parts:[
    {ox:0,oy:-110,vx:(Math.random()-.5)*5,vy:-8-Math.random()*3,rot:0,vrot:(Math.random()-.5)*.35,type:'head'},
    {ox:0,oy:-56,vx:(Math.random()-.5)*3,vy:-4,rot:0,vrot:(Math.random()-.5)*.2,type:'body'},
    {ox:-20,oy:-68,vx:-3-Math.random()*3,vy:-5,rot:0,vrot:-.28,type:'arm'},
    {ox:20, oy:-68,vx:3+Math.random()*3, vy:-5,rot:0,vrot:.28, type:'arm'},
    {ox:-12,oy:-28, vx:-2,               vy:-3,rot:0,vrot:-.22,type:'leg'},
    {ox:12, oy:-28, vx:2,                vy:-2,rot:0,vrot:.22, type:'leg'},
  ]};
  sloMo=0.2;sloT=55;
  shPow=16;
  pExplode(eX,eY-35,true);

  const killScore=500*combo;
  score+=killScore;
  fText(eX,eY-145,'+'+killScore+'  ×'+combo,'#f5c842',34);

  kf.style.background='rgba(255,210,60,.38)';
  setTimeout(()=>kf.style.background='transparent',130);

  wave++;
  setTimeout(respawnEnemy,1200);
  updateUI();
}

function respawnEnemy(){
  eDead=false;eDeadTimer=0;ragdoll=null;
  enemyMaxHP=BASE_HP+wave*20;
  enemyHP=enemyMaxHP;
  eX=90+Math.random()*(W-180);
  eBaseSpd=Math.min(6.8,1.8+wave*0.33);
  eStagger=0;eStun=0;ePanic=false;
  eChangeDirT=0; // איפוס טיימר החלטה
  updateUI();
}

// ═══════════════════════════════════════════════════════════
//  GAME LOOP & UPDATE LOGIC
// ═══════════════════════════════════════════════════════════
function updateEntities(){
  if(comboTimer>0){
    comboTimer -= sloMo;
    if(comboTimer<=0){combo=1;lastComboVal=1;updateUI();}
  }

  // DRONE MOVEMENT
  if(goL) dVX -= D_ACCEL;
  if(goR) dVX += D_ACCEL;
  dVX *= D_FRIC;
  if(dVX>D_MAX)dVX=D_MAX; if(dVX<-D_MAX)dVX=-D_MAX;
  dX += dVX*sloMo;
  if(dX<55){dX=55;dVX=0;} if(dX>W-55){dX=W-55;dVX=0;}
  if(Math.abs(dVX)>0.25) pEngine();

  // ENEMY LOGIC (SOLDIER)
  if(!eDead){
    if(eStun>0) {
      eStun -= sloMo;
    } else {
      if(ePanic){
        eX += ePanicVX*sloMo;
        eAnim += Math.abs(ePanicVX)*0.4*sloMo;
        eDir = ePanicVX>0?1:-1;
        ePanicT -= sloMo;
        if(ePanicT<=0)ePanic=false;
      } else {
        // מנגנון בחירת כיוון ותנועה רנדומלית
        eChangeDirT -= sloMo;
        if(eChangeDirT <= 0) {
          eChangeDirT = 60 + Math.random() * 120; // קבלת החלטה חדשה כל 1-2 שניות
          const randOption = Math.random();
          
          if(randOption < 0.4) {
            eDir = 1; // ללכת ימינה
            eCurrentSpd = eBaseSpd * (0.6 + Math.random() * 0.6);
          } else if(randOption < 0.8) {
            eDir = -1; // ללכת שמאלה
            eCurrentSpd = eBaseSpd * (0.6 + Math.random() * 0.6);
          } else {
            eCurrentSpd = 0; // לעמוד לרגע במקום
          }
        }

        // תנועה בפועל לפי ההחלטה הרנדומלית
        eX += (eDir * eCurrentSpd) * sloMo;
        if(eCurrentSpd > 0) {
          eAnim += eCurrentSpd * 0.25 * sloMo;
        }
      }

      // שמירה על גבולות המסך
      if(eX < 60) { eX = 60; eDir = 1; eChangeDirT = 0; }
      if(eX > W-60) { eX = W-60; eDir = -1; eChangeDirT = 0; }
    }
    if(eStagger>0) eStagger -= sloMo;
  } else {
    // RAGDOLL PHYSICS
    if(ragdoll){
      ragdoll.parts.forEach(p=>{
        p.ox += p.vx*sloMo; p.oy += p.vy*sloMo;
        p.vy += p.grav*sloMo; p.rot += p.vrot*sloMo;
        if(ragdoll.y+p.oy > GY+16){
          ragdoll.y+p.oy==GY+16; p.vx*=0.6; p.vy=-p.vy*0.35; p.vrot*=0.5;
        }
      });
    }
    eDeadTimer -= sloMo;
  }

  // COOLDOWNS
  if(gCD>0) { gCD-=sloMo; if(gCD<=0)updateUI(); }
  if(eCD>0) { eCD-=sloMo; if(eCD<=0)updateUI(); }

  // GRENADES
  grenades.forEach((g,idx)=>{
    g.armT -= sloMo; if(g.armT<=0)g.armed=true;
    g.x += g.vx*sloMo; g.y += g.vy*sloMo;
    g.vy += 0.28*sloMo; g.rot += g.vrot*sloMo;

    if(g.y >= GY-6){
      g.y=GY-6; g.vx*=0.6; g.vy=-g.vy*0.4; g.vrot*=0.5;
    }
    if(g.x<20||g.x>W-20) g.vx*=-0.7;

    const hitDist=g.armed ? 60 : 32;
    if(!eDead && Math.hypot(g.x-eX, g.y-(eY-42)) < hitDist){
      pExplode(g.x,g.y,false);
      damageEnemy(35,false);
      shX=g.x;shY=g.y;shPow=10;
      grenades.splice(idx,1);
      return;
    }
    if(g.y>=GY-8 && Math.abs(g.vx)<0.1 && Math.abs(g.vy)<0.2){
      pExplode(g.x,g.y,false);
      if(!eDead && Math.hypot(g.x-eX,g.y-eY)<110){
        damageEnemy(25,false);
        shX=g.x;shY=g.y;shPow=7;
      }
      grenades.splice(idx,1);
    }
  });

  // ELECTRIC BOLT TIMEOUT
  if(boltActive){
    boltTimer -= sloMo;
    if(boltTimer<=0)boltActive=false;
  }

  // SHOCKWAVE SCREEN SHAKE
  if(shPow>0) shPow *= 0.88;

  // SLOMO TIMEOUT
  if(sloT>0){ sloT-=1; if(sloT<=0)sloMo=1; }

  // ENV EFFECTS
  bgClouds.forEach(c=>{ c.x+=c.spd*sloMo; if(c.x-c.w>W)c.x=-c.w; });
  bgBirds.forEach(b=>{ b.x-=b.spd*sloMo; b.ft+=sloMo; if(b.x<-30){b.x=W+30;b.y=35+Math.random()*85;} });

  // PARTICLES
  particles.forEach((p,idx)=>{
    p.x+=p.vx*sloMo; p.y+=p.vy*sloMo; p.vy+=p.grav*sloMo;
    p.life-=sloMo; if(p.life<=0)particles.splice(idx,1);
  });
  floats.forEach((f,idx)=>{
    f.y+=f.vy*sloMo; f.life-=sloMo; if(f.life<=0)floats.splice(idx,1);
  });
  shockwaves.forEach((s,idx)=>{
    s.r += (s.mr-s.r)*0.18*sloMo;
    s.life-=sloMo; if(s.life<=0)shockwaves.splice(idx,1);
  });
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP DRAW
// ═══════════════════════════════════════════════════════════
function draw(){
  cx.clearRect(0,0,W,H);
  cx.save();
  if(shPow>1.2){
    const sx=(Math.random()-.5)*shPow, sy=(Math.random()-.5)*shPow;
    cx.translate(sx,sy);
  }

  drawBG();

  grenades.forEach(g=>{
    cx.save();cx.translate(g.x,g.y);cx.rotate(g.rot);
    cx.fillStyle='#2c3d22';cx.beginPath();cx.arc(0,0,7,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#486038';cx.lineWidth=1.5;cx.stroke();
    cx.fillStyle='#8c2010';cx.fillRect(-2,-10,4,4);
    cx.fillStyle='#666';cx.fillRect(-1,-6,2,3);
    cx.restore();
  });

  if(!eDead) drawSoldier(eX,eY,eDir,eAnim,eStagger,eStun,enemyHP,enemyMaxHP);
  else drawRagdoll();

  drawDrone();

  if(boltActive && boltPts.length>1){
    cx.save();
    for(let r=0;r<3;r++){
      cx.strokeStyle=r===0?'rgba(120,255,230,0.22)':r===1?'rgba(200,255,255,0.6)':'#fff';
      cx.lineWidth=r===0?15:r===1?6:2;
      cx.beginPath();cx.moveTo(boltPts[0].x,boltPts[0].y);
      for(let i=1;i<boltPts.length;i++) cx.lineTo(boltPts[i].x,boltPts[i].y);
      cx.stroke();
    }
    cx.restore();
  }

  particles.forEach(p=>{
    cx.fillStyle=p.col; cx.globalAlpha=Math.max(0,p.life/p.ml);
    cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;

  shockwaves.forEach(s=>{
    cx.strokeStyle=`rgba(255,235,190,${Math.max(0,s.life/s.ml)*0.35})`;
    cx.lineWidth=4; cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.stroke();
  });

  floats.forEach(f=>{
    cx.fillStyle=f.col; cx.font=`900 ${f.sz}px Orbitron,Courier New`;
    cx.textAlign='center'; cx.globalAlpha=Math.max(0,f.life/f.ml);
    cx.fillText(f.txt,f.x,f.y);
  });
  cx.globalAlpha=1;

  cx.restore();
}

function loop(){
  updateEntities();
  draw();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
//  CONTROLS & KEYBOARD
// ═══════════════════════════════════════════════════════════
window.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') goL=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') goR=true;
  if(e.code==='Space'||e.code==='KeyW') throwGrenade();
  if(e.code==='ShiftLeft'||e.code==='KeyE') useElectric();
});
window.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') goL=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') goR=false;
});

const bL=document.getElementById('btnL'), bR=document.getElementById('btnR');
['touchstart','mousedown'].forEach(ev=>{
  bL.addEventListener(ev,e=>{e.preventDefault();goL=true;});
  bR.addEventListener(ev,e=>{e.preventDefault();goR=true;});
  document.getElementById('btnG').addEventListener(ev,e=>{e.preventDefault();throwGrenade();});
  document.getElementById('btnE').addEventListener(ev,e=>{e.preventDefault();useElectric();});
});
['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>{
  bL.addEventListener(ev,e=>{e.preventDefault();goL=false;});
  bR.addEventListener(ev,e=>{e.preventDefault();goR=false;});
});

// INIT
updateUI();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
